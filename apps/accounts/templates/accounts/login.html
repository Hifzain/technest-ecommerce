{% extends 'base.html' %}
{% block title %}Login | TechNest{% endblock %}
{% block content %}
<div class="auth-container" data-aos="fade-up">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to your TechNest account</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">Login</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{% url 'accounts:register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
